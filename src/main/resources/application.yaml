spring:
  application:
    name: eventhub

  datasource:
    url: jdbc:mysql://localhost:3306/eventhub_db
    username: root
    password: 1234

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect